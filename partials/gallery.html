<section id="gallery" class="gallery-section" aria-label="Galeria zdjęć">
  <div class="section-header">
    <div>
      <span class="section-label reveal">Wnętrza i otoczenie</span>
      <h2 class="section-title reveal reveal-delay-1">Galeria</h2>
    </div>
  </div>

  <div class="gallery-grid">
    <a
      href="/assets/images/cabin-exterior-front.webp"
      class="gallery-item reveal"
      data-gallery="cabin"
      data-description="Widok na domek z przodu"
    >
      <picture>
        <source
          srcset="/assets/images/cabin-exterior-front.webp"
          type="image/webp"
        />
        <img
          src="/assets/images/cabin-exterior-front.jpg"
          alt="Widok na domek z przodu"
          loading="lazy"
        />
      </picture>
      <div class="gallery-item-overlay">
        <span class="gallery-item-desc">Widok z przodu</span>
      </div>
    </a>

    <a
      href="/assets/images/cabin-terrace-detail.webp"
      class="gallery-item reveal reveal-delay-1"
      data-gallery="cabin"
      data-description="Taras z widokiem na las"
    >
      <picture>
        <source
          srcset="/assets/images/cabin-terrace-detail.webp"
          type="image/webp"
        />
        <img
          src="/assets/images/cabin-terrace-detail.jpg"
          alt="Taras z widokiem na las"
          loading="lazy"
        />
      </picture>
      <div class="gallery-item-overlay">
        <span class="gallery-item-desc">Taras</span>
      </div>
    </a>

    <a
      href="/assets/images/cabin-forest-surroundings.webp"
      class="gallery-item reveal reveal-delay-2"
      data-gallery="cabin"
      data-description="Otoczenie lasu"
    >
      <picture>
        <source
          srcset="/assets/images/cabin-forest-surroundings.webp"
          type="image/webp"
        />
        <img
          src="/assets/images/cabin-forest-surroundings.jpg"
          alt="Otoczenie lasu"
          loading="lazy"
        />
      </picture>
      <div class="gallery-item-overlay">
        <span class="gallery-item-desc">Las</span>
      </div>
    </a>

    <a
      href="/assets/images/cabin-exterior-detail.webp"
      class="gallery-item reveal reveal-delay-3"
      data-gallery="cabin"
      data-description="Szczegół elewacji domku"
    >
      <picture>
        <source
          srcset="/assets/images/cabin-exterior-detail.webp"
          type="image/webp"
        />
        <img
          src="/assets/images/cabin-exterior-detail.jpg"
          alt="Szczegół elewacji domku"
          loading="lazy"
        />
      </picture>
      <div class="gallery-item-overlay">
        <span class="gallery-item-desc">Elewacja</span>
      </div>
    </a>
  </div>
</section>
